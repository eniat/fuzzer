http:
  user_agent: "uni-fuzzer/0.1 (+https://example.local)"
  add_referer: true
  timeout_get_seconds: 2
  timeout_post_seconds: 2
  redirects:
    baseline_get: true
    baseline_post: true
    fuzz_get: false
    fuzz_post: false
    stored_xss: True
    submit: False

concurrency:
  max_workers: 20
  path_workers_recursive: 10

crawler:
  mode_default: "both"
  max_pages_default: 20
  rate_limit_default: 0.0
  headless_default: true
  output_to_file_default: false
  junk_keywords:
    - "mat-"
    - "mdc-"
    - "cdk-"
    - "ng-"
    - "slider"
    - "toggle"
    - "checkbox"
    - "submit"
    - "reset"
    - "button"
    - "unnamed"
    - "go to file"
    - "input:"
    - "user_token"
    - "max_file_size"
    - "upload"
    - "change"

fuzz:
  max_depth_default: 3
  similarity_skip_threshold: 0.90
  baseline_404_path: "/thisshouldnotexist143903458903527903452"
  excluded_extensions: [".php", ".js", ".css", ".png", ".jpg", ".json"]
  skipped_fields:
    - user_token
    - security
    - login
    - upload
    - change
    - max_file_size
    - step
    - create_db
    - btnclear
    - btnsign
    - rememberme
    - captcha
    - default
    - security_level
    - bug
    - mail_activation
    - create_db'

path_traversal:
  max_samples_per_group: 3
  indicators:
    - "root:x:0:0"
    - "daemon:x"
    - "bin:x"
    - "/bin/bash"
    - "[boot loader]"
    - "[extensions]"
    - "multi(0)disk(0)rdisk(0)"
    - "illegal file type"
    - "enoent"
    - "eacces"
    - "failed to open stream"
    - "stack trace"
    - " at /"
    - "open '/etc/passwd'"
    - "cannot open file"
    - "permission denied"
    - "failed opening required"
    - "linux version"
    - "include("
    - "require("
    - "c:\\windows\\system32"
    - "\\r\\n"
    - "<drive>"

xss:
  dom_payloads:
    - "<img src=x onerror=alert(1)>"
    - "\"><img src=x onerror=alert(1)>"
    - "'\"><img src=x onerror=alert(1)>"
    - "<video src=x onerror=alert(1)>"
    - "<audio src=x onerror=alert(1)>"
    - "<details open ontoggle=alert(1)>"
    - "\"><svg/onload=alert(1)>"
    - "<svg/onload=alert(1)>"
    - "</script><script>alert(1)</script>"
    - "<iframe srcdoc='<script>alert(1)</script>'></iframe>"
    - "<body onload=alert(1)>"
    - "<img src=1 onerror=alert`1`>"
    - "<img src=x onerror=confirm(1)>"
    - "<marquee onstart=alert(1)>"
    - "javascript:alert(1)"
  dom_delay_seconds: 0.25
  regex:
    script: "<script[^>]*>(?:(?!</script>).)*({token})(?:(?!</script>).)*</script>"
    attr: "\\bon\\w+\\s*=\\s*(['\\\"]).*?({token}).*?\\1"
    jsurl: "(?:href|src)\\s*=\\s*(['\\\"])\\s*javascript:.*?({token}).*?\\1"
  max_samples_per_group: 3

sqli:
  error_signatures:
    - "you have an error in your sql syntax"
    - "mysql_fetch"
    - "mysqli_"
    - "pg_query"
    - "syntax error at or near"
    - "unclosed quotation mark after the character string"
    - "ora-"
    - "unknown column"
    - "no such column"
    - "unrecognized token"
    - "near \"select\""
    - "warning: mysql"
    - "odbc sql server driver"
    - "sqlstate"
    - "quoted string not properly terminated"
  blind_markers:
    - "sleep("
    - "benchmark("
    - "waitfor delay"
    - "pg_sleep("
    - "dbms_lock.sleep"
    - "dbms_pipe.receive_message"
  max_samples_per_group: 3
  timing_threshold_ms: 2500
  blind_timing_factor: 2.2
  blind_time: 6
  timeout_blind: 30
  timing_baseline_probes: 5
  timing_payload_trials: 2
  timing_confirm_probes: 1
  auto_submit_keys:
    - "submit"
    - "btn"
    - "button"
    - "search"
    - "btnsign"
    - "btnclear"
  boolean_true:
    - "1=1"
    - "2>1"
  boolean_false:
    - "1=2"
    - "2>3"
  boolean_wrappers:
    - " AND ({cond})-- "
    - "' AND ({cond})-- "
    - "') AND ({cond})-- "
    - ") AND ({cond})-- "
  boolean_success_keywords:
    - "exists"
    - "found"
    - "valid"
    - "success"
    - "match"
    - "logged in"
    - "welcome"
  boolean_failure_keywords:
    - "missing"
    - "not found"
    - "invalid"
    - "no results"
    - "failed"
    - "does not exist"

paths:
  file_extensions:
    - ".php"
    - ".html"
    - ".asp"
    - ".aspx"
    - ".jsp"
    - ".py"
    - ".rb"
    - ".zip"

auth:
  login_path: "/login"

  selenium_wait_seconds:
    short: 2
    medium: 5
    long: 10

  selectors:
    username_field: "login"
    password_field: "password"
    submit_name: "form"