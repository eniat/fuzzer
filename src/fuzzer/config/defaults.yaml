http:
  user_agent: "fuzzer/0.1 (local testing)"
  add_referer: true
  timeout_get_seconds: 5
  timeout_post_seconds: 5
  crawl_get: 5
  crawl_post: 5
  redirects:
    baseline_get: true
    baseline_post: true
    fuzz_get: false
    fuzz_post: false
    stored_xss: True
    submit: true

concurrency:
  max_workers: 10
  path_workers_recursive: 5
  threads_per_session: 2
  max_sessions_cap: 12

crawler:
  mode_default: "both"
  max_pages_default: 50
  rate_limit_default: 0.2
  headless_default: true
  option_capacity: 80
  junk_keywords:
    - "mat-"
    - "mdc-"
    - "cdk-"
    - "ng-"
    - "slider"
    - "toggle"
    - "checkbox"
    - "submit"
    - "reset"
    - "button"
    - "unnamed"
    - "go to file"
    - "input:"
    - "user_token"
    - "max_file_size"
    - "upload"
    - "change"
  dom_wait: 0.5

fuzz:
  max_depth_default: 3
  similarity_skip_threshold: 0.90
  baseline_404_path: "/thisshouldnotexist143903458903527903452"
  excluded_extensions: [".php", ".js", ".css", ".png", ".jpg", ".json"]
  skipped_fields:
    - user_token
    - security
    - upload
    - change
    - login
    - max_file_size
    - step
    - create_db
    - btnclear
    - rememberme
    - captcha
    - security_level
    - bug
    - mail_activation
    - create_db'
    - bug

path_traversal:
  max_samples_per_group: 3
  indicators:
    - "root:x:0:0"
    - "daemon:x"
    - "bin:x"
    - "/bin/bash"
    - "[boot loader]"
    - "[extensions]"
    - "multi(0)disk(0)rdisk(0)"
    - "illegal file type"
    - "enoent"
    - "eacces"
    - "failed to open stream"
    - "stack trace"
    - " at /"
    - "open '/etc/passwd'"
    - "cannot open file"
    - "permission denied"
    - "failed opening required"
    - "linux version"
    - "include("
    - "require("
    - "c:\\windows\\system32"
    - "\\r\\n"
    - "<drive>"

xss:
  dom_payloads:
    - ";window.__XSS_CANARY__=\"{CANARY}\";document.body.insertAdjacentHTML('afterbegin','<x-canary data-t=\"{CANARY}\"></x-canary>');//"
    - "javascript:window.__XSS_CANARY__=\"{CANARY}\";document.title=\"{CANARY}\""
    - "\"><script>window.__XSS_CANARY__=\"{CANARY}\";</script>"
    - "<svg onload=\"window.__XSS_CANARY__='{CANARY}'\"></svg>"
    - "\"><img src=x onerror=\"window.__XSS_CANARY__='{CANARY}'\">"
    - "';localStorage.setItem(\"x\",\"{CANARY}\")//"
    - "\";sessionStorage.setItem(\"y\",\"{CANARY}\")//"
    - "</script><script>window.__XSS_CANARY__=\"{CANARY}\"</script>"
  dom_delay_seconds: 0.25
  regex:
    attr: "\\bon\\w+\\s*=\\s*(['\\\"]).*?({token}).*?\\1"
    jsurl: "(?:href|src)\\s*=\\s*(['\\\"])\\s*javascript:.*?({token}).*?\\1"
  max_samples_per_group: 3

sqli:
  error_signatures:
    - "you have an error in your sql syntax"
    - "syntax error at or near"
    - "unclosed quotation mark after the character string"
    - "unknown column"
    - "no such column"
    - "unrecognized token"
    - "warning: mysql"
    - "odbc sql server driver"
    - "quoted string not properly terminated"
    - "error: "
    - "incorrect syntax"
  blind_markers:
    - "sleep("
    - "benchmark("
    - "waitfor delay"
    - "pg_sleep("
    - "dbms_lock.sleep"
    - "dbms_pipe.receive_message"
  max_samples_per_group: 3
  timing_threshold_ms: 700
  blind_timing_factor: 2.0
  blind_time: 1
  timeout_blind: 120
  timing_baseline_probes: 3
  timing_payload_trials: 2
  timing_confirm_probes: 2
  plain_preprobe_min_delta: 1
  confirm_min_size_delta: 200
  boolean_true:
    - "1=1"
    - "2>1"
  boolean_false:
    - "1=2"
    - "2>3"
  boolean_wrappers:
    - " AND ({cond})-- "
    - "' AND ({cond})-- "
    - "') AND ({cond})-- "
    - ") AND ({cond})-- "
    - "' or {cond};#"
  boolean_success_keywords:
    - "exists"
    - "found"
    - "valid"
    - "success"
    - "match"
    - "logged in"
    - "welcome"
  boolean_failure_keywords:
    - "missing"
    - "not found"
    - "invalid"
    - "no results"
    - "failed"
    - "does not exist"

paths:
  file_extensions:
    - ".php"
    - ".html"
    - ".asp"
    - ".aspx"
    - ".jsp"
    - ".py"
    - ".rb"
    - ".zip"
  sensitive_files:
    - "web.config"
    - "config.inc.php"
    - "config.php"
    - ".env"
    - "install.php"
    - ".git"
    - ".git/config"
  auto_submit_keys:
    - "submit"
    - "btn"
    - "button"
    - "search"
    - "btnsign"
    - "save"
    - "ok"
    - "login"
    - "add"
    - "update"

auth:
  login_path: "/login"
  post_cookie_clear_wait: 2

  selenium_wait_seconds:
    short: 2
    medium: 5
    long: 10

  selectors:
    username_field: "username" # 'username' for DVWA and 'login' for bWAPP
    password_field: "password"
    submit_name: "Login" # 'Login' for DVWA and 'form' for bWAPP

llm:
  similarity: 0.25

logging:
  format: "%(asctime)s | %(levelname)-7s | %(name)s | %(message)s"
  json_format: '{"ts":"%(asctime)s","level":"%(levelname)s","logger":"%(name)s","msg":"%(message)s","file":"%(filename)s","line":%(lineno)d}'
  date_format: "%Y-%m-%d %H:%M:%S"